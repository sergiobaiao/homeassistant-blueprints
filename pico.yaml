blueprint:
  name: Lutron Pico (up to 5 Buttons - Event Entities)
  description: >
    Blueprint for Lutron Pico remotes using event.* entities. Supports up to 5
    buttons, each with its own event entity and action. A Pico device must also
    be selected so the automation is associated with the device and events are
    validated against that device. Version 0.11

  source_url: https://github.com/sergiobaiao/homeassistant-blueprints/blob/main/pico.yaml

  domain: automation

  input:
    pico_device:
      name: Pico Device
      description: >
        Select the Lutron Pico device. This links the automation to the device
        and prevents events from another Pico from triggering this automation.
      selector:
        device:
          integration: lutron

    event_type:
      name: Event Type
      description: Usually single_press for Lutron Pico event entities.
      default: single_press
      selector:
        select:
          options:
            - single_press
            - press
            - release

    button_1_event:
      name: Button 1 Event
      description: "Example: event.pico_cortinas_home_on"
      default: ""
      selector:
        entity:
          domain: event

    button_1_action:
      name: Button 1 Action
      default: []
      selector:
        action: {}

    button_2_event:
      name: Button 2 Event
      description: "Example: event.pico_cortinas_home_off"
      default: ""
      selector:
        entity:
          domain: event

    button_2_action:
      name: Button 2 Action
      default: []
      selector:
        action: {}

    button_3_event:
      name: Button 3 Event
      description: "Example: event.pico_cortinas_home_raise"
      default: ""
      selector:
        entity:
          domain: event

    button_3_action:
      name: Button 3 Action
      default: []
      selector:
        action: {}

    button_4_event:
      name: Button 4 Event
      description: "Example: event.pico_cortinas_home_lower"
      default: ""
      selector:
        entity:
          domain: event

    button_4_action:
      name: Button 4 Action
      default: []
      selector:
        action: {}

    button_5_event:
      name: Button 5 Event
      description: "Example: event.pico_cortinas_home_favorite"
      default: ""
      selector:
        entity:
          domain: event

    button_5_action:
      name: Button 5 Action
      default: []
      selector:
        action: {}

mode: restart
max_exceeded: silent

trigger:
  - platform: event
    event_type: state_changed

variables:
  pico_device: !input pico_device
  event_type_filter: !input event_type
  button_1_event: !input button_1_event
  button_2_event: !input button_2_event
  button_3_event: !input button_3_event
  button_4_event: !input button_4_event
  button_5_event: !input button_5_event
  configured_button_events:
    - !input button_1_event
    - !input button_2_event
    - !input button_3_event
    - !input button_4_event
    - !input button_5_event
  fired_entity: "{{ trigger.event.data.entity_id }}"
  fired_event_type: >
    {{ trigger.event.data.new_state.attributes.event_type
       if trigger.event.data.new_state is not none
       else none }}

action:
  - condition: template
    value_template: >
      {{ fired_entity is string and fired_entity.startswith('event.') }}

  - condition: template
    value_template: >
      {{ fired_entity in configured_button_events }}

  - condition: template
    value_template: >
      {{ fired_entity in device_entities(pico_device) }}

  - condition: template
    value_template: >
      {{ fired_event_type == event_type_filter }}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ fired_entity == button_1_event }}"
        sequence: !input button_1_action

      - conditions:
          - condition: template
            value_template: "{{ fired_entity == button_2_event }}"
        sequence: !input button_2_action

      - conditions:
          - condition: template
            value_template: "{{ fired_entity == button_3_event }}"
        sequence: !input button_3_action

      - conditions:
          - condition: template
            value_template: "{{ fired_entity == button_4_event }}"
        sequence: !input button_4_action

      - conditions:
          - condition: template
            value_template: "{{ fired_entity == button_5_event }}"
        sequence: !input button_5_action
