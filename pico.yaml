blueprint:
  name: Lutron Pico (up to 5 Buttons - Event Entities)
  description: >
    Blueprint for Lutron Pico remotes using event.* entities. Supports up to 5 buttons,
    each with its own event entity and action. Requires selecting the Pico device so
    the automation is associated with the device and only accepts events that belong
    to that device. Version 0.12
  source_url: https://github.com/sergiobaiao/homeassistant-blueprints/blob/main/pico.yaml
  domain: automation

  input:
    pico_device:
      name: Pico Device
      description: Select the Lutron Pico device that owns the event entities below.
      selector:
        device:
          integration: lutron

    event_type:
      name: Event Type
      description: Usually single_press. Use another value only if the event entity supports it.
      default: single_press
      selector:
        select:
          mode: dropdown
          options:
            - single_press
            - press
            - release
            - long_press
            - double_press

    button_1_event:
      name: Button 1 Event
      description: "Example: event.pico_cortinas_home_on"
      default: ""
      selector:
        entity:
          domain: event

    button_1_action:
      name: Button 1 Action
      default: []
      selector:
        action: {}

    button_2_event:
      name: Button 2 Event
      description: "Example: event.pico_cortinas_home_off"
      default: ""
      selector:
        entity:
          domain: event

    button_2_action:
      name: Button 2 Action
      default: []
      selector:
        action: {}

    button_3_event:
      name: Button 3 Event
      description: "Example: event.pico_cortinas_home_raise"
      default: ""
      selector:
        entity:
          domain: event

    button_3_action:
      name: Button 3 Action
      default: []
      selector:
        action: {}

    button_4_event:
      name: Button 4 Event
      description: "Example: event.pico_cortinas_home_lower"
      default: ""
      selector:
        entity:
          domain: event

    button_4_action:
      name: Button 4 Action
      default: []
      selector:
        action: {}

    button_5_event:
      name: Button 5 Event
      description: "Example: event.pico_cortinas_home_favorite"
      default: ""
      selector:
        entity:
          domain: event

    button_5_action:
      name: Button 5 Action
      default: []
      selector:
        action: {}

mode: restart
max_exceeded: silent

variables:
  pico_device: !input pico_device
  selected_event_type: !input event_type

triggers:
  # Do NOT listen to every state_changed event. Each trigger listens only to the
  # configured event entity. Empty inputs use entity_id "" and will never match.
  - trigger: event
    id: button_1
    event_type: state_changed
    event_data:
      entity_id: !input button_1_event

  - trigger: event
    id: button_2
    event_type: state_changed
    event_data:
      entity_id: !input button_2_event

  - trigger: event
    id: button_3
    event_type: state_changed
    event_data:
      entity_id: !input button_3_event

  - trigger: event
    id: button_4
    event_type: state_changed
    event_data:
      entity_id: !input button_4_event

  - trigger: event
    id: button_5
    event_type: state_changed
    event_data:
      entity_id: !input button_5_event

conditions:
  # Only event.* entities are allowed.
  - condition: template
    value_template: >
      {{ trigger.event.data.entity_id is string and trigger.event.data.entity_id.startswith('event.') }}

  # The selected event entity must belong to the selected Pico device.
  - condition: template
    value_template: >
      {{ trigger.event.data.entity_id in device_entities(pico_device) }}

  # Match only the selected event type. Use .get() to avoid template warnings when
  # a state_changed event does not carry this attribute.
  - condition: template
    value_template: >
      {{ trigger.event.data.new_state is not none
         and trigger.event.data.new_state.attributes.get('event_type') == selected_event_type }}

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: button_1
        sequence: !input button_1_action

      - conditions:
          - condition: trigger
            id: button_2
        sequence: !input button_2_action

      - conditions:
          - condition: trigger
            id: button_3
        sequence: !input button_3_action

      - conditions:
          - condition: trigger
            id: button_4
        sequence: !input button_4_action

      - conditions:
          - condition: trigger
            id: button_5
        sequence: !input button_5_action
