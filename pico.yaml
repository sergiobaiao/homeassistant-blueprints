blueprint:
  name: Lutron Pico (5 Buttons - Event Entities)
  description: >
    Blueprint for Lutron Pico remotes using event.* entities.
    Supports up to 5 buttons, each with its own event entity and action.
    Version 0.5

  source_url: https://raw.githubusercontent.com/sergiobaiao/homeassistant-blueprints/refs/heads/main/pico.yaml

  domain: automation

  input:
    button_1_event:
      name: Button 1 Event
      description: "Example: event.pico_cortinas_home_on"
      default: ""
      selector:
        entity:
          domain: event

    button_1_action:
      name: Button 1 Action
      default: []
      selector:
        action: {}

    button_2_event:
      name: Button 2 Event
      description: "Example: event.pico_cortinas_home_off"
      default: ""
      selector:
        entity:
          domain: event

    button_2_action:
      name: Button 2 Action
      default: []
      selector:
        action: {}

    button_3_event:
      name: Button 3 Event
      default: ""
      selector:
        entity:
          domain: event

    button_3_action:
      name: Button 3 Action
      default: []
      selector:
        action: {}

    button_4_event:
      name: Button 4 Event
      default: ""
      selector:
        entity:
          domain: event

    button_4_action:
      name: Button 4 Action
      default: []
      selector:
        action: {}

    button_5_event:
      name: Button 5 Event
      default: ""
      selector:
        entity:
          domain: event

    button_5_action:
      name: Button 5 Action
      default: []
      selector:
        action: {}

mode: restart
max_exceeded: silent

triggers:
  - trigger: event.received
    id: button_1
    target:
      entity_id: !input button_1_event
    options:
      event_type:
        - single_press

  - trigger: event.received
    id: button_2
    target:
      entity_id: !input button_2_event
    options:
      event_type:
        - single_press

  - trigger: event.received
    id: button_3
    target:
      entity_id: !input button_3_event
    options:
      event_type:
        - single_press

  - trigger: event.received
    id: button_4
    target:
      entity_id: !input button_4_event
    options:
      event_type:
        - single_press

  - trigger: event.received
    id: button_5
    target:
      entity_id: !input button_5_event
    options:
      event_type:
        - single_press

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: button_1
        sequence: !input button_1_action

      - conditions:
          - condition: trigger
            id: button_2
        sequence: !input button_2_action

      - conditions:
          - condition: trigger
            id: button_3
        sequence: !input button_3_action

      - conditions:
          - condition: trigger
            id: button_4
        sequence: !input button_4_action

      - conditions:
          - condition: trigger
            id: button_5
        sequence: !input button_5_action