blueprint:
  name: Lutron Pico 5 Botões (event.*) - Ações Livres
  description: >
    Version 0.0.1
    Blueprint para controle remoto Lutron Pico (5 botões) usando entidades event.*
    do novo modelo do Home Assistant. Permite definir ações livres para qualquer
    entidade (light, switch, cover, scene, script, media_player, etc).

  domain: automation
  input:
    pico_on_event:
      name: Evento botão ON
      selector:
        entity:
          domain: event

    pico_raise_event:
      name: Evento botão RAISE (subir)
      selector:
        entity:
          domain: event

    pico_favorite_event:
      name: Evento botão FAVORITE (meio)
      selector:
        entity:
          domain: event

    pico_lower_event:
      name: Evento botão LOWER (descer)
      selector:
        entity:
          domain: event

    pico_off_event:
      name: Evento botão OFF
      selector:
        entity:
          domain: event

    action_on:
      name: Ação botão ON
      default: []
      selector:
        action: {}

    action_raise:
      name: Ação botão RAISE
      default: []
      selector:
        action: {}

    action_favorite:
      name: Ação botão FAVORITE
      default: []
      selector:
        action: {}

    action_lower:
      name: Ação botão LOWER
      default: []
      selector:
        action: {}

    action_off:
      name: Ação botão OFF
      default: []
      selector:
        action: {}

mode: restart
max_exceeded: silent

trigger:
  - platform: event
    event_type: event.received
    id: on
    event_data:
      entity_id: !input pico_on_event
      event_type: single_press

  - platform: event
    event_type: event.received
    id: raise
    event_data:
      entity_id: !input pico_raise_event
      event_type: single_press

  - platform: event
    event_type: event.received
    id: favorite
    event_data:
      entity_id: !input pico_favorite_event
      event_type: single_press

  - platform: event
    event_type: event.received
    id: lower
    event_data:
      entity_id: !input pico_lower_event
      event_type: single_press

  - platform: event
    event_type: event.received
    id: off
    event_data:
      entity_id: !input pico_off_event
      event_type: single_press

action:
  - choose:
      - conditions:
          - condition: trigger
            id: on
        sequence: !input action_on

      - conditions:
          - condition: trigger
            id: raise
        sequence: !input action_raise

      - conditions:
          - condition: trigger
            id: favorite
        sequence: !input action_favorite

      - conditions:
          - condition: trigger
            id: lower
        sequence: !input action_lower

      - conditions:
          - condition: trigger
            id: off
        sequence: !input action_off