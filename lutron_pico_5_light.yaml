blueprint:
  name: Lutron Pico 5 Botões (Device + event.*) - Ações Livres
  description: >
    Version 0.0.3. Usa um único device Lutron Pico e detecta automaticamente
    as entidades event.* dos botões ON, RAISE, FAVORITE, LOWER e OFF associadas
    ao device. Cada botão pode executar qualquer ação do Home Assistant.
  domain: automation

  input:
    pico_device:
      name: Device do Pico
      description: Selecione o device Lutron Pico.
      selector:
        device:
          integration: lutron

    event_type:
      name: Tipo de evento
      description: Normalmente use single_press.
      default: single_press
      selector:
        select:
          options:
            - single_press
            - long_press
            - double_press

    action_on:
      name: Ação botão ON
      default: []
      selector:
        action: {}

    action_raise:
      name: Ação botão RAISE
      default: []
      selector:
        action: {}

    action_favorite:
      name: Ação botão FAVORITE
      default: []
      selector:
        action: {}

    action_lower:
      name: Ação botão LOWER
      default: []
      selector:
        action: {}

    action_off:
      name: Ação botão OFF
      default: []
      selector:
        action: {}

mode: single
max_exceeded: silent

variables:
  pico_device: !input pico_device
  wanted_event_type: !input event_type
  pico_entities: "{{ device_entities(pico_device) }}"
  event_on: >-
    {{ pico_entities | select('match', '^event\\..*_on$') | list | first | default('') }}
  event_raise: >-
    {{ pico_entities | select('match', '^event\\..*_raise$') | list | first | default('') }}
  event_favorite: >-
    {{ pico_entities | select('match', '^event\\..*_favorite$') | list | first | default('') }}
  event_lower: >-
    {{ pico_entities | select('match', '^event\\..*_lower$') | list | first | default('') }}
  event_off: >-
    {{ pico_entities | select('match', '^event\\..*_off$') | list | first | default('') }}

triggers:
  - trigger: event.received
    id: pico_any_button
    target:
      device_id: !input pico_device
    options:
      event_type:
        - !input event_type

conditions: []

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.event.data.entity_id == event_on and trigger.event.data.event_type == wanted_event_type }}
        sequence: !input action_on

      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.event.data.entity_id == event_raise and trigger.event.data.event_type == wanted_event_type }}
        sequence: !input action_raise

      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.event.data.entity_id == event_favorite and trigger.event.data.event_type == wanted_event_type }}
        sequence: !input action_favorite

      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.event.data.entity_id == event_lower and trigger.event.data.event_type == wanted_event_type }}
        sequence: !input action_lower

      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.event.data.entity_id == event_off and trigger.event.data.event_type == wanted_event_type }}
        sequence: !input action_off
