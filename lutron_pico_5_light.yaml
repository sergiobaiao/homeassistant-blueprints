blueprint:
  name: Lutron Pico 5 Botões por Device (event.*) - Ações Livres
  description: >
    Version 0.0.2
    Usa um único device Lutron Pico e detecta automaticamente as entidades event.*
    dos botões ON, RAISE, FAVORITE, LOWER e OFF associadas ao device.
    Cada botão pode executar qualquer ação do Home Assistant.
  domain: automation
  input:
    pico_device:
      name: Device do Pico
      description: Selecione o device Lutron Pico. O blueprint localizará automaticamente os events dos botões desse device.
      selector:
        device:
          integration: lutron

    event_type:
      name: Tipo de evento
      description: Normalmente use single_press. Altere se sua integração expuser outro tipo, como long_press.
      default: single_press
      selector:
        select:
          options:
            - single_press
            - double_press
            - long_press
            - release
          custom_value: true

    action_on:
      name: Ação botão ON
      default: []
      selector:
        action: {}

    action_raise:
      name: Ação botão RAISE
      default: []
      selector:
        action: {}

    action_favorite:
      name: Ação botão FAVORITE
      default: []
      selector:
        action: {}

    action_lower:
      name: Ação botão LOWER
      default: []
      selector:
        action: {}

    action_off:
      name: Ação botão OFF
      default: []
      selector:
        action: {}

variables:
  pico_device: !input pico_device
  wanted_event_type: !input event_type
  pico_event_entities: >-
    {{ device_entities(pico_device) | select('match', '^event\\.') | list }}
  event_on: >-
    {{ pico_event_entities | select('search', '_on$') | list | first | default('') }}
  event_raise: >-
    {{ pico_event_entities | select('search', '_raise$') | list | first | default('') }}
  event_favorite: >-
    {{ pico_event_entities | select('search', '_favorite$') | list | first | default('') }}
  event_lower: >-
    {{ pico_event_entities | select('search', '_lower$') | list | first | default('') }}
  event_off: >-
    {{ pico_event_entities | select('search', '_off$') | list | first | default('') }}

triggers:
  - trigger: event.received

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.event.data.entity_id == event_on and trigger.event.data.event_type == wanted_event_type }}
        sequence: !input action_on

      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.event.data.entity_id == event_raise and trigger.event.data.event_type == wanted_event_type }}
        sequence: !input action_raise

      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.event.data.entity_id == event_favorite and trigger.event.data.event_type == wanted_event_type }}
        sequence: !input action_favorite

      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.event.data.entity_id == event_lower and trigger.event.data.event_type == wanted_event_type }}
        sequence: !input action_lower

      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.event.data.entity_id == event_off and trigger.event.data.event_type == wanted_event_type }}
        sequence: !input action_off

mode: queued
max: 10
