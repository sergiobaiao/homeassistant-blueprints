blueprint:
  name: Lutron Pico 5 Botões (event.received) - Ações Livres
  description: >
    Version 0.0.5. Blueprint para controles Lutron Pico no novo modelo do
    Home Assistant, usando entidades event.* e trigger event.received.
    Cada botão pode executar qualquer ação do Home Assistant.
  domain: automation

  input:
    pico_on_event:
      name: Evento botão ON
      description: Exemplo: event.pico_cortinas_home_on
      selector:
        entity:
          domain: event

    pico_raise_event:
      name: Evento botão RAISE / subir
      description: Exemplo: event.pico_cortinas_home_raise
      selector:
        entity:
          domain: event

    pico_favorite_event:
      name: Evento botão FAVORITE / meio
      description: Exemplo: event.pico_cortinas_home_favorite
      selector:
        entity:
          domain: event

    pico_lower_event:
      name: Evento botão LOWER / descer
      description: Exemplo: event.pico_cortinas_home_lower
      selector:
        entity:
          domain: event

    pico_off_event:
      name: Evento botão OFF
      description: Exemplo: event.pico_cortinas_home_off
      selector:
        entity:
          domain: event

    event_type:
      name: Tipo de evento
      description: Normalmente use single_press.
      default: single_press
      selector:
        select:
          options:
            - single_press
            - long_press
            - double_press

    action_on:
      name: Ação botão ON
      default: []
      selector:
        action: {}

    action_raise:
      name: Ação botão RAISE
      default: []
      selector:
        action: {}

    action_favorite:
      name: Ação botão FAVORITE
      default: []
      selector:
        action: {}

    action_lower:
      name: Ação botão LOWER
      default: []
      selector:
        action: {}

    action_off:
      name: Ação botão OFF
      default: []
      selector:
        action: {}

mode: single
max_exceeded: silent

triggers:
  - trigger: event.received
    id: on
    target:
      entity_id: !input pico_on_event
    options:
      event_type:
        - !input event_type

  - trigger: event.received
    id: raise
    target:
      entity_id: !input pico_raise_event
    options:
      event_type:
        - !input event_type

  - trigger: event.received
    id: favorite
    target:
      entity_id: !input pico_favorite_event
    options:
      event_type:
        - !input event_type

  - trigger: event.received
    id: lower
    target:
      entity_id: !input pico_lower_event
    options:
      event_type:
        - !input event_type

  - trigger: event.received
    id: off
    target:
      entity_id: !input pico_off_event
    options:
      event_type:
        - !input event_type

conditions: []

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: on
        sequence: !input action_on

      - conditions:
          - condition: trigger
            id: raise
        sequence: !input action_raise

      - conditions:
          - condition: trigger
            id: favorite
        sequence: !input action_favorite

      - conditions:
          - condition: trigger
            id: lower
        sequence: !input action_lower

      - conditions:
          - condition: trigger
            id: off
        sequence: !input action_off
