blueprint:
  name: Lutron Pico (Device-based inteligente)
  description: >
    Seleciona um device Lutron Pico e automaticamente reage aos botões.

  domain: automation

  input:
    pico_device:
      name: Device do Pico
      selector:
        device:
          integration: lutron

    event_type:
      name: Tipo de evento
      default: single_press
      selector:
        select:
          options:
            - single_press
            - long_press

    action_on:
      name: Ação botão ON
      default: []
      selector:
        action: {}

    action_raise:
      name: Ação botão RAISE
      default: []
      selector:
        action: {}

    action_favorite:
      name: Ação botão FAVORITE
      default: []
      selector:
        action: {}

    action_lower:
      name: Ação botão LOWER
      default: []
      selector:
        action: {}

    action_off:
      name: Ação botão OFF
      default: []
      selector:
        action: {}

mode: restart

trigger:
  - platform: event
    event_type: event.received

variables:
  device_entities: "{{ device_entities(pico_device) }}"

condition:
  - condition: template
    value_template: >
      {{ trigger.event.data.entity_id in device_entities }}

  - condition: template
    value_template: >
      {{ trigger.event.data.event_type == event_type }}

action:
  - variables:
      entity: "{{ trigger.event.data.entity_id }}"

  - choose:

      - conditions: "{{ entity.endswith('_on') }}"
        sequence: !input action_on

      - conditions: "{{ entity.endswith('_raise') }}"
        sequence: !input action_raise

      - conditions: "{{ entity.endswith('_favorite') }}"
        sequence: !input action_favorite

      - conditions: "{{ entity.endswith('_lower') }}"
        sequence: !input action_lower

      - conditions: "{{ entity.endswith('_off') }}"
        sequence: !input action_off